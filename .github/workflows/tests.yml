name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    name: Unit tests (SQLite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest -v -m "not postgres"

  integration:
    name: Integration smoke tests (Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: sgp
          POSTGRES_PASSWORD: sgp_test_password
          POSTGRES_DB: sgp_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sgp -d sgp_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://sgp:sgp_test_password@localhost:5432/sgp_test
      AUTH_MODE: mock
      APP_ENV: development
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Apply migrations
        run: alembic upgrade head
      - name: Seed demo data
        run: python scripts/seed.py
      - name: Run integration smoke tests
        run: pytest -v -m postgres
